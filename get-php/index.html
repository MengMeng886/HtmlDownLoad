<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta http-equiv="x-ua-compatible" content="IE=EmulateIE7">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <script src="./static/vue.min.js"></script>
    <script>
        document.write('<script src="./config.js?_=' + new Date().getTime() + '"><\/script>');
    </script>
    <script src="./qr-code-styling.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .flex {
            display: flex;
            align-items: center;
        }

        input,
        .input {
            display: block;
            min-height: 40px;
            padding: 0 10px;
            width: 500px;
            line-height: 30px;
            border: 1px solid #ddd;
        }

        button {
            display: block;
            height: 40px;
            padding: 0 10px;
            min-width: 100px;
            padding: 0 20px;
        }
    </style>
</head>

<body>
    <div id="app" style="margin: 0 auto;width: 600px;padding-top: 30vh;">
        <div class="flex">
            <input type="text" v-model="key_str" placeholder="输入密钥">
            <button @click="_submit(1)">分发地址1</button>
           
            <button @click="_submit(3)">苹果网页封装地址</button>
            <!--<button @click="_submit(5)">安卓新加固</button>-->
            <!--<button @click="_submit(3)">内部下载地址</button>-->
        </div>
        <div v-show="domain" style="margin-top: 20px;">
            <div class="flex">
                <div class="input">
                    {{domain}}
                </div>
                <button @click="_copy(domain)">复制</button>
            </div>
            <div>
                <div id="canvas"></div>
                <!-- <img id="qrcodeImage" alt="QR Code" style="width: 200px;height: 200px;border: 1px solid #ddd;"> -->
            </div>
        </div>
    </div>
</body>
<script>
    var app = new Vue({
        el: '#app',
        data() {
            return {
                domain_opp: '',
                domain: '',
                key_str: '',
                message: 'Hello Vue!'
            }
        },
        created() {
        },
        methods: {
            _qrcode_logo(url) {
                const qrCode = new QRCodeStyling({
                    width: 300,
                    height: 300,
                    data: url,
                    image: "./logo.png",
                    dotsOptions: {
                        color: "#000",
                        type: "rounded"
                    },
                    backgroundOptions: {
                        color: "#fff",
                    },
                    imageOptions: {
                        crossOrigin: "anonymous",
                        margin: 10,
                        width: 30,
                        height: 30
                    }
                });
                document.getElementById("canvas").innerHTML = '';
                qrCode.append(document.getElementById("canvas"));
            },
            _copy(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed'; // 避免滚动
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    const successful = document.execCommand('copy');
                    if (successful) {
                        alert('复制成功!');
                    } else {
                        alert('复制失败');
                    }
                } catch (err) {
                    alert('复制失败');
                }
                document.body.removeChild(textarea);
            },
            _submit(e) {
                if (this.key_str != config.key) {
                    alert('密钥错误');
                }
                else {



                    fetch('time.php')
                        .then(res => res.text())
                        .then(ts => {

                            console.log(ts, 'uu');



                            let index = config.usedIndex;
                            let arr = config.domains;
                            let arr_opp = config.oppodomains;
                            if (index < 0) {
                                index = 0;
                            }
                            if (index > arr.length - 1) {
                                index = arr.length - 1;
                            }
                            if (e == 1) {
                               
                               this.domain = "https://" + arr[index] + `?in=${index}&time=${ts}`;
                                //this.domain = "https://" + this._random() + '.' + arr[index] + `?index=${index}&t=${ts}&type=1&ownios=3`;
                            } else if (e == 2) {
                               
                                this.domain = "https://" + arr[index] + `?in=${index}&time=${ts}`;
                                //this.domain = "https://" + this._random() + '.' + arr[index] + `?index=${index}&t=${ts}&type=2&ownios=3`;
                            } else if (e == 3) {
                                
                                this.domain = "https://"+ arr_opp[index] + `?in=${index}&time=${ts}`;
                                //this.domain = "https://" + arr[index] + `?index=${index}&t=${ts}&type=2&ownios=3`;
                            }
                            if (index + 1 > arr.length - 1) {
                                this._write(0);
                            }
                            else {
                                this._write(index + 1);
                            }
                            this._qrcode_logo(this.domain);
                            // const url = "https://" + this._random() + '.' + arr[index] + `?index=${index}&t=${ts}&type=1&ownios=0`;
                            // this.domain = url;
                        });




                }
            },
            _random() {
                const length = Math.floor(Math.random() * (10 - 4 + 1)) + 4;
                const characters = 'abcdefghijklmnopqrstuvwxyz0123456789'; // 可选字符
                const numbers = '0123456789'; // 数字字符
                let result = '';
                // 确保第一个字符不是数字
                result += characters.charAt(Math.floor(Math.random() * (characters.length - numbers.length))); // 选择字母作为第一个字符
                // 生成剩下的随机字符
                for (let i = 1; i < length; i++) {
                    const randomIndex = Math.floor(Math.random() * characters.length); // 随机字符索引
                    result += characters[randomIndex]; // 拼接字符
                }
                return result;
            },
            _write(index) {
                // 创建 XMLHttpRequest 对象
                var xhr = new XMLHttpRequest();
                // 设置请求类型为 POST，目标为 index.php
                xhr.open('POST', './do.php', true);
                // 设置请求头，告诉服务器我们发送的是表单数据
                xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
                // 设置请求完成后的回调函数
                xhr.onload = function () {
                };
                // 发送请求，传递数据
                xhr.send('index=' + index);
            }
        }
    })
</script>

</html>
