<body style="background: url(./bg.jpg) center center/cover no-repeat;width: 100%;height: 100vh;">

        <div style="flex: 1;"></div>
        <img src="./logo.png" alt="" style="width: 100px;">
        <!-- 这里是名字 -->
        <div style="font-size: 28px;margin-top: 30px; ">

        <div style="flex: 1;"></div>

                <div
                    style="background: #fff;color: #333;text-align: left;padding: 20px;border-radius: 10px;font-size: 14px;line-height: 2;">

                            <img src="./ios.png" alt="" style="width: 20px;height: 20px;">
                        </div>
                    </div>

                        · 打开
                        <span style="color: red;text-decoration: underline;">
                            设置-通用-VPN与设备管理

                        找到刚安装的应用，点击设置信任
                    </div>

<script>
    var app = new Vue({
        el: '#app',
        data() {
            return {
                show_tip: false,
                ios_url: '',
                and_url: '',
                domain: '',
                key_str: '',
                and_index: 0,
                ios_index: 0
            }
        },
        created() {
            const queryString = window.location.search;
            const urlParams = new URLSearchParams(queryString);
            let index = Number(urlParams.get('in'));
            if (!index) {
                index = 0;
            }
            let time = Number(urlParams.get('time'));
            let channel = Number(urlParams.get('channel'));



            fetch('time.php')
                .then(res => res.text())
                .then(ts => {

                    console.log(ts);


                    if (ts - time < 30 * 60) {//30分钟内
                    } else {




                        console.log(2);

                        location.href = "/404.html";

                    }
                   
                   fetch('file2.php')
                        .then(res => res.text())
                        .then(ts => {
        
                            console.log(ts);
                            this.and_url = "/apk/" + ts;
                            //使用这个方式，需要修改file2.php路面的 dir路径为 apk的全路径
                    
                    })
                    
                    this.ios_url = config.ownios;
                    
                })

        },
        methods: {
            _downloadFile(url) {
                const a = document.createElement('a');  // 创建一个 a 标签
                a.href = url;  // 设置下载文件的链接
                a.download = url.split('/').pop();  // 设置下载的文件名
                document.body.appendChild(a);  // 将 a 标签添加到页面中
                a.click();  // 触发点击事件，开始下载
                document.body.removeChild(a);  // 下载后移除 a 标签
            },
            _down_ios(e) {
                if (config.iostourl) {
                    location.href = this.ios_url;
                }
                else {
                    this._downloadFile(this.ios_url);
                    this.show_tip = true;
                }
            }
        }
    })
</script>

</html>
